services:
  zkconnect:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PORT=8080
      - NODE_ENV=production
      - DATABASE_PATH=./data/zkconnect.db
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=changeme123
      - API_KEY=your-api-key-here
      - SYNC_INTERVAL_MS=10000
      - LOG_LEVEL=info
    restart: unless-stopped
