services:
  postgres:
    image: postgres:17-alpine
    container_name: zkc-postgres
    environment:
      POSTGRES_USER: zkc
      POSTGRES_PASSWORD: zkc_dev
      POSTGRES_DB: zkc
    ports:
      - "5432:5432"
    volumes:
      - zkc-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zkc -d zkc"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zkc-redis
    ports:
      - "6379:6379"
    volumes:
      - zkc-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  zkc-pg-data:
  zkc-redis-data:
